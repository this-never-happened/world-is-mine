<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World Is Mine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8621A;
    --teal: #2A7C6F;
    --gold: #D4A843;
    --cream: #F5EDD8;
    --brown: #2C1A0E;
    --bg: #1A0E06;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--cream);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .scene {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Artwork */
  .artwork-wrap.presave iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: inherit;
    display: block;
  }

  .artwork-wrap {
    position: relative;
    width: min(72vw, 340px);
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .artwork-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(100%) brightness(0.35);
    transition: filter 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .artwork-img.unlocked {
    filter: grayscale(0%) brightness(1);
  }

  /* Lock icon overlay */
  .lock-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }

  .lock-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Superman overlay — full-size, warps out on unlock */
  .superman-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: opacity 0.35s ease;
  }

  .superman-overlay.warping {
    animation: supermanWarp 1.6s cubic-bezier(0.4, 0, 0.8, 1) forwards;
  }

  @keyframes supermanWarp {
    0%   { transform: scale(1)    skewX(0deg)  skewY(0deg);  filter: brightness(1)   blur(0px);   opacity: 1; }
    30%  { transform: scale(1.08) skewX(-4deg) skewY(2deg);  filter: brightness(1.4) blur(0px);   opacity: 1; }
    55%  { transform: scale(1.22) skewX(6deg)  skewY(-3deg); filter: brightness(2)   blur(3px);   opacity: 0.85; }
    75%  { transform: scale(1.35) skewX(-2deg) skewY(1deg);  filter: brightness(2.5) blur(8px);   opacity: 0.4; }
    100% { transform: scale(1.5)  skewX(0deg)  skewY(0deg);  filter: brightness(3)   blur(18px);  opacity: 0; }
  }

  /* Track info */
  .track-info {
    margin-top: 12px;
    text-align: center;
    opacity: 1;
    transform: translateY(0);
  }

  .track-title {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cream);
    transition: color 0.6s ease;
  }

  .track-title.unlocked {
    color: var(--orange);
  }

  .track-artist {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Player embed area */
  .player-wrap {
    width: min(72vw, 340px);
    margin-top: 24px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.9s ease 1.1s, transform 0.9s ease 1.1s;
    min-height: 80px;
    position: relative;
  }

  .player-wrap::before {
    content: 'NOW PLAYING';
    display: block;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.75;
  }

  .player-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .player-wrap iframe {
    width: 100%;
    border-radius: 12px;
    border: none;
    display: block;
    box-shadow: 0 0 0 1px rgba(212,168,67,0.18), 0 8px 32px rgba(0,0,0,0.55);
  }

  /* CTA button */
  .cta-wrap {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: opacity 0.5s ease;
  }

  .cta-wrap.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
  }

  .btn-locate {
    background: var(--orange);
    color: var(--cream);
    border: none;
    padding: 14px 36px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-locate:active { transform: scale(0.97); }
  .btn-locate:hover { background: #d45510; }
  .btn-locate:disabled { background: #5a2f10; cursor: default; }

  /* Status message */
  .status {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    min-height: 18px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .status.show { opacity: 1; }

  /* City dots (decorative) */
  .city-dots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.18;
  }

  .dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 6px var(--teal);
  }

  .dot.active {
    background: var(--orange);
    box-shadow: 0 0 12px var(--orange);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(2.5); opacity: 0.5; }
  }

  /* Scanning animation */
  @keyframes scan {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }

  .scanning { animation: scan 1.4s ease-in-out infinite; }

  .btn-dev {
    background: transparent;
    color: var(--teal);
    border: 1px dashed var(--teal);
    padding: 8px 20px;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 4px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<!-- Decorative city dots -->
<div class="city-dots" id="cityDots"></div>

<div class="scene">
  <div class="artwork-wrap">
    <img class="artwork-img" id="artwork" src="Lane 8_Cross Poll_World is mine Medium.jpeg" alt="World Is Mine">
    <div class="lock-overlay" id="lockOverlay">
      <img class="superman-overlay" id="supermanOverlay" src="Superman.jpeg" alt="Superman">
    </div>
  </div>

  <div class="track-info" id="trackInfo">
    <div class="track-title" id="trackTitle">Superman</div>
    <div class="track-artist">Lane 8, Kasbo &amp; BJOERN</div>
  </div>

  <div class="player-wrap" id="playerWrap"></div>

  <div class="cta-wrap" id="ctaWrap">
    <button class="btn-locate" id="btnLocate" onclick="checkLocation()">Find my location</button>
    <div class="status" id="status"></div>
    <button class="btn-dev" id="btnDev" onclick="unlock('Dev')" style="display:none">⚡ Dev unlock</button>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  trackTitleLocked: "Superman",
  trackTitleUnlocked: "World Is Mine",
  artist: "Lane 8, Kasbo & BJOERN",

  // Paste your SoundCloud private share embed or Spotify embed HTML here
  // SoundCloud example: '<iframe width="100%" height="166" allow="autoplay" src="https://w.soundcloud.com/player/?url=...&auto_play=true&color=%23E8621A"></iframe>'
  // Spotify example:    '<iframe src="https://open.spotify.com/embed/track/..." height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>'
  embedHTML: `<iframe style="border-radius: 12px; color-scheme: dark;" src="https://untitled.stream/embed/MOhK7m3fRDEL?theme=dark&bg=1a0e06&color=e8621a" width="100%" height="344" allowFullScreen="" allow="picture-in-picture" frameborder="0" loading="eager"></iframe>`,

  // Unlock zones — lat, lng, radius in metres
  // NOTE: radii set large for city-wide testing — tighten to 300 before campaign launch
  zones: [
    { city: "Washington Park", lat: 39.7002, lng: -104.9687, radius: 400 },  // Denver test — tighten to ~100m for specific spot
    // ADD: Stockholm park — coordinates TBC
  ]
};
// ─────────────────────────────────────────────────────────────────────────────

// ── Locked title + artwork cycle ─────────────────────────────────────────────
const LOCKED_TITLES  = ["Superman", "Soothe My Mind", "???", "What Is That ID"];
const LOCKED_ARTWORK = {
  "Superman":       "Superman.jpeg",
  "Soothe My Mind": "soothe mind.jpeg",
  "???":            "question.jpeg"
};
const ID_ARTWORK = [
  "ID.jpeg",
  "ID 2.jpeg"
];
let _idArtworkIndex = 0;

function getArtwork(title) {
  if (title === "What Is That ID") {
    const src = ID_ARTWORK[_idArtworkIndex];
    _idArtworkIndex = (_idArtworkIndex + 1) % ID_ARTWORK.length;
    return src;
  }
  return LOCKED_ARTWORK[title];
}

let _titleCycleTimer = null;
let _titleIndex = 0;

function swapOverlayImage(newSrc) {
  const overlayEl = document.getElementById('supermanOverlay');
  if (!overlayEl) return;
  overlayEl.style.opacity = '0';
  setTimeout(() => {
    overlayEl.src = newSrc;
    overlayEl.style.opacity = '1';
  }, 350);
}

function startTitleCycle() {
  const titleEl = document.getElementById('trackTitle');
  titleEl.textContent = LOCKED_TITLES[0];

  function cycleNext() {
    _titleIndex = (_titleIndex + 1) % LOCKED_TITLES.length;
    const nextTitle = LOCKED_TITLES[_titleIndex];
    scrambleReveal(titleEl, nextTitle);
    swapOverlayImage(getArtwork(nextTitle));
    _titleCycleTimer = setTimeout(cycleNext, 2000);
  }

  _titleCycleTimer = setTimeout(cycleNext, 2000); // first swap after 2s
}

startTitleCycle();

// Dev mode — append ?dev to the URL to show the bypass button
if (new URLSearchParams(window.location.search).has('dev')) {
  document.getElementById('btnDev').style.display = 'block';
}

// Text scramble reveal
function scrambleReveal(el, finalText) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%&';
  let frame = 0;
  const totalFrames = 28;
  const interval = setInterval(() => {
    el.textContent = finalText
      .split('')
      .map((char, i) => {
        if (char === ' ') return ' ';
        if (frame / totalFrames > i / finalText.length) return char;
        return chars[Math.floor(Math.random() * chars.length)];
      })
      .join('');
    frame++;
    if (frame > totalFrames) {
      el.textContent = finalText;
      clearInterval(interval);
    }
  }, 45);
}

// Decorative city dots (approximate screen positions — purely aesthetic)
const dotPositions = [
  {x: 48, y: 35}, {x: 22, y: 28}, {x: 15, y: 42},
  {x: 72, y: 55}, {x: 85, y: 68}, {x: 62, y: 22},
  {x: 35, y: 65}, {x: 78, y: 30}, {x: 55, y: 80},
  {x: 10, y: 60}, {x: 90, y: 45}, {x: 42, y: 15},
];
const dotsEl = document.getElementById('cityDots');
dotPositions.forEach((p, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.style.left = p.x + '%';
  d.style.top = p.y + '%';
  dotsEl.appendChild(d);
});

// Haversine distance in metres
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setStatus(msg, show = true) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('show', show);
}

// ── Tier 1: continuous geo-watch + access revocation ─────────────────────────
let _watchId    = null;
let _isUnlocked = false;

function startWatching() {
  if (!navigator.geolocation || _watchId !== null) return;
  _watchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (!_isUnlocked) return;
      const { latitude: lat, longitude: lng } = pos.coords;
      const stillIn = CONFIG.zones.some(z => haversine(lat, lng, z.lat, z.lng) <= z.radius);
      if (!stillIn) revoke();
    },
    null,
    { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
  );
}

function revoke() {
  _isUnlocked = false;

  // Kill the player
  const playerWrap = document.getElementById('playerWrap');
  playerWrap.innerHTML = '';
  playerWrap.classList.remove('visible');

  // Restore artwork slot — swap pre-save back to locked artwork
  const wrap = document.querySelector('.artwork-wrap');
  if (wrap.classList.contains('presave')) {
    // Can't restore base64 artwork easily — just reset to dark placeholder
    wrap.classList.remove('presave');
    wrap.style.aspectRatio  = '';
    wrap.style.height       = '';
    wrap.style.width        = '';
    wrap.style.opacity      = '1';
    wrap.innerHTML = '';
  }

  // Re-show locate button
  const ctaWrap = document.getElementById('ctaWrap');
  ctaWrap.classList.remove('hidden');
  const btn = document.getElementById('btnLocate');
  btn.disabled    = false;
  btn.textContent = 'Find my location';

  setStatus("You've left the zone — return to unlock again.");
}
// ─────────────────────────────────────────────────────────────────────────────

function unlock(cityName) {
  // Light up that city's dot (first one matching)
  const dots = dotsEl.querySelectorAll('.dot');
  if (dots.length) dots[Math.floor(Math.random() * dots.length)].classList.add('active');

  // Warp-exit the Superman overlay, then fade the lock-overlay
  const supermanEl = document.getElementById('supermanOverlay');
  if (supermanEl) {
    supermanEl.classList.add('warping');
    supermanEl.addEventListener('animationend', () => {
      document.getElementById('lockOverlay').classList.add('hidden');
    }, { once: true });
  } else {
    document.getElementById('lockOverlay').classList.add('hidden');
  }

  // Reveal artwork
  document.getElementById('artwork').classList.add('unlocked');

  // Kill the locked title cycle and reveal the real title
  clearTimeout(_titleCycleTimer);
  setTimeout(() => {
    const titleEl = document.getElementById('trackTitle');
    scrambleReveal(titleEl, CONFIG.trackTitleUnlocked);
    titleEl.classList.add('unlocked');
  }, 800);

  // Inject player
  const playerWrap = document.getElementById('playerWrap');
  playerWrap.innerHTML = CONFIG.embedHTML;
  playerWrap.classList.add('visible');

  // Swap artwork slot → pre-save widget after a beat
  setTimeout(() => {
    const wrap = document.querySelector('.artwork-wrap');
    // Fade out artwork + overlay
    wrap.style.transition = 'opacity 0.6s ease';
    wrap.style.opacity = '0';
    setTimeout(() => {
      wrap.innerHTML = '<iframe src="https://tnh.ffm.to/worldismine/widget?width=300&height=250&note=" scrolling="no" frameborder="0" loading="lazy"></iframe>';
      wrap.classList.add('presave');
      // Remove square constraint so feature.fm widget fills cleanly
      wrap.style.aspectRatio = 'auto';
      wrap.style.height = '250px';
      wrap.style.width = 'min(72vw, 300px)';
      wrap.style.marginTop = '0';
      wrap.style.opacity = '1';
    }, 650);
  }, 2800);

  // Mark as unlocked and start continuous geo-watch
  _isUnlocked = true;
  startWatching();

  // Hide CTA
  document.getElementById('ctaWrap').classList.add('hidden');

  setStatus('');
}

function checkLocation() {
  const btn = document.getElementById('btnLocate');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported on this device.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('scanning');
  btn.textContent = 'Locating…';
  setStatus('Finding you…', true);

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.classList.remove('scanning');
      const { latitude: lat, longitude: lng } = pos.coords;

      for (const zone of CONFIG.zones) {
        const dist = haversine(lat, lng, zone.lat, zone.lng);
        if (dist <= zone.radius) {
          unlock(zone.city);
          return;
        }
      }

      // Not in any zone
      btn.disabled = false;
      btn.textContent = 'Find my location';
      setStatus('Not there yet. Find the right place.');
    },
    (err) => {
      btn.classList.remove('scanning');
      btn.disabled = false;
      btn.textContent = 'Find my location';

      const msgs = {
        1: 'Location access denied. Enable it in your browser settings.',
        2: 'Position unavailable. Try again outside.',
        3: 'Request timed out. Try again.',
      };
      setStatus(msgs[err.code] || 'Something went wrong. Try again.');
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}
</script>
</body>
</html>

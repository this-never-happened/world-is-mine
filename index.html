<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World Is Mine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8621A;
    --teal: #2A7C6F;
    --gold: #D4A843;
    --cream: #F5EDD8;
    --brown: #2C1A0E;
    --bg: #1A0E06;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--cream);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Full-screen artwork background — revealed on unlock */
  #bgArt {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.28);
    opacity: 0;
    transition: opacity 2.5s ease;
    z-index: 0;
    pointer-events: none;
  }

  #bgArt.visible { opacity: 1; }

  .scene {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 1;
  }

  /* Artwork */

  .artwork-wrap {
    position: relative;
    width: min(72vw, 340px);
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.02) translate(0px,    0px);   }
    25%  { transform: scale(1.05) translate(-5px,  -4px);   }
    50%  { transform: scale(1.05) translate( 4px,  -5px);   }
    75%  { transform: scale(1.05) translate( 3px,   3px);   }
    100% { transform: scale(1.02) translate(0px,    0px);   }
  }

  .artwork-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(100%) brightness(0.35);
    transition: filter 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation: kenburns 16s ease-in-out infinite;
    will-change: transform;
  }

  .artwork-img.unlocked {
    filter: grayscale(0%) brightness(1);
  }

  /* Edge vignette on artwork */
  .artwork-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    box-shadow: inset 0 0 40px rgba(26,14,6,0.55);
    pointer-events: none;
  }

  /* Track info */
  .track-info {
    margin-top: 12px;
    text-align: center;
    opacity: 1;
    transform: translateY(0);
  }

  .track-title {
    display: flex;
    justify-content: center;
    gap: 2px;
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--cream);
    transition: color 0.6s ease;
  }

  .track-title.unlocked { color: var(--orange); }

  /* Solari board tiles — no box, letters only */
  .tile {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.35ch;
    height: 1.8em;
  }

  .tile.space { width: 0.7ch; }

  @keyframes flap {
    0%   { transform: rotateX(0deg);   }
    49%  { transform: rotateX(-90deg); }
    51%  { transform: rotateX(90deg);  }
    100% { transform: rotateX(0deg);   }
  }

  .track-artist {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Pre-save button */
  .presave-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    margin-top: 8px;
  }

  .presave-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .presave-label {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.75;
  }

  .btn-presave {
    background: transparent;
    color: var(--cream);
    border: 1px solid rgba(245,237,216,0.35);
    padding: 13px 32px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
    display: inline-block;
  }

  .btn-presave:hover, .btn-presave:active {
    background: rgba(245,237,216,0.08);
    border-color: var(--cream);
  }

  /* Player embed area */
  .player-wrap {
    width: min(72vw, 340px);
    margin-top: 24px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.9s ease 1.1s, transform 0.9s ease 1.1s;
    min-height: 80px;
    position: relative;
  }

  .player-wrap::before {
    content: 'NOW PLAYING';
    display: block;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.75;
  }

  .player-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .player-wrap iframe {
    width: 100%;
    border-radius: 12px;
    border: none;
    display: block;
    box-shadow: 0 0 0 1px rgba(212,168,67,0.18), 0 8px 32px rgba(0,0,0,0.55);
  }

  /* CTA button */
  .cta-wrap {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: opacity 0.5s ease;
  }

  .cta-wrap.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
  }

  .btn-locate {
    background: var(--orange);
    color: var(--cream);
    border: none;
    padding: 14px 36px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-locate:active { transform: scale(0.97); }
  .btn-locate:hover { background: #d45510; }
  .btn-locate:disabled { background: #5a2f10; cursor: default; }

  /* Status message */
  .status {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    min-height: 18px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .status.show { opacity: 1; }

  /* City dots (decorative) */
  .city-dots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.18;
  }

  .dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 6px var(--teal);
  }

  .dot.active {
    background: var(--orange);
    box-shadow: 0 0 12px var(--orange);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(2.5); opacity: 0.5; }
  }

  /* Scanning animation */
  @keyframes scan {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }

  .scanning { animation: scan 1.4s ease-in-out infinite; }

  .btn-dev {
    background: transparent;
    color: var(--teal);
    border: 1px dashed var(--teal);
    padding: 8px 20px;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 4px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<!-- Full-screen background artwork (revealed on unlock) -->
<img id="bgArt" src="Lane 8_Cross Poll_World is mine [high res].jpg" alt="">

<!-- Decorative city dots -->
<div class="city-dots" id="cityDots"></div>

<div class="scene">
  <div class="artwork-wrap">
    <img class="artwork-img" id="artwork" src="Lane 8_Cross Poll_World is mine [high res].jpg" alt="World Is Mine">
  </div>

  <div class="track-info" id="trackInfo">
    <div class="track-title" id="trackTitle"></div>
    <div class="track-artist">Lane 8, Kasbo &amp; BJOERN</div>
  </div>

  <div class="player-wrap" id="playerWrap"></div>

  <div class="presave-wrap" id="presaveWrap">
    <span class="presave-label">Out now</span>
    <a class="btn-presave" href="https://tnh.ffm.to/worldismine" target="_blank" rel="noopener">Save to library</a>
  </div>

  <div class="cta-wrap" id="ctaWrap">
    <button class="btn-locate" id="btnLocate" onclick="checkLocation()">Find my location</button>
    <div class="status" id="status"></div>
    <button class="btn-dev" id="btnDev" onclick="unlock('Dev')" style="display:none">⚡ Dev unlock</button>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  trackTitleLocked: "World Is Mine",
  trackTitleUnlocked: "World Is Mine",
  artist: "Lane 8, Kasbo & BJOERN",

  // Paste your SoundCloud private share embed or Spotify embed HTML here
  // SoundCloud example: '<iframe width="100%" height="166" allow="autoplay" src="https://w.soundcloud.com/player/?url=...&auto_play=true&color=%23E8621A"></iframe>'
  // Spotify example:    '<iframe src="https://open.spotify.com/embed/track/..." height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>'
  embedHTML: `<iframe style="border-radius: 12px; color-scheme: dark;" src="https://untitled.stream/embed/MOhK7m3fRDEL?theme=dark&bg=1a0e06&color=e8621a" width="100%" height="344" allowFullScreen="" allow="picture-in-picture" frameborder="0" loading="eager"></iframe>`,

  // Unlock zones — lat, lng, radius in metres
  // NOTE: radii set large for city-wide testing — tighten to 300 before campaign launch
  zones: [
    { city: "Denver", lat: 39.7392, lng: -104.9903, radius: 15000 },
    // Stockholm — add coords here before Stockholm event
  ]
};
// ─────────────────────────────────────────────────────────────────────────────

// Dev mode — append ?dev to the URL to show the bypass button
if (new URLSearchParams(window.location.search).has('dev')) {
  document.getElementById('btnDev').style.display = 'block';
}

// Render title as tiles showing correct chars immediately
function renderTitle(el, text) {
  const upper = text.toUpperCase();
  el.style.perspective = '400px';
  el.innerHTML = upper.split('').map(c =>
    c === ' '
      ? '<span class="tile space">\u00a0</span>'
      : `<span class="tile" data-char="${c}">${c}</span>`
  ).join('');
}

// Flip a tile to a random char then back to its real char
function flipTile(tile) {
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const orig = tile.dataset.char;
  const rnd  = CHARS[Math.floor(Math.random() * CHARS.length)];

  function doFlip(nextChar, then) {
    tile.style.animation = 'none';
    void tile.offsetWidth;
    tile.style.animation = 'flap 0.13s linear';
    setTimeout(() => { tile.textContent = nextChar; }, 65);
    tile.addEventListener('animationend', () => { tile.style.animation = ''; then(); }, { once: true });
  }

  doFlip(rnd, () => doFlip(orig, () => { tile.textContent = orig; }));
}

// Randomly flip individual letters on a slow idle loop
function idleFlap(el) {
  function loop() {
    const tiles = [...el.querySelectorAll('.tile:not(.space):not([data-busy])')];
    if (tiles.length) {
      const tile = tiles[Math.floor(Math.random() * tiles.length)];
      tile.dataset.busy = '1';
      flipTile(tile);
      setTimeout(() => delete tile.dataset.busy, 400);
    }
    setTimeout(loop, 900 + Math.random() * 1400);
  }
  setTimeout(loop, 600 + Math.random() * 800);
}

const titleEl = document.getElementById('trackTitle');
renderTitle(titleEl, CONFIG.trackTitleLocked);
idleFlap(titleEl);

// Decorative city dots (approximate screen positions — purely aesthetic)
const dotPositions = [
  {x: 48, y: 35}, {x: 22, y: 28}, {x: 15, y: 42},
  {x: 72, y: 55}, {x: 85, y: 68}, {x: 62, y: 22},
  {x: 35, y: 65}, {x: 78, y: 30}, {x: 55, y: 80},
  {x: 10, y: 60}, {x: 90, y: 45}, {x: 42, y: 15},
];
const dotsEl = document.getElementById('cityDots');
dotPositions.forEach((p, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.style.left = p.x + '%';
  d.style.top = p.y + '%';
  dotsEl.appendChild(d);
});

// Haversine distance in metres
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setStatus(msg, show = true) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('show', show);
}

// ── Tier 1: continuous geo-watch + access revocation ─────────────────────────
let _watchId    = null;
let _isUnlocked = false;

function startWatching() {
  if (!navigator.geolocation || _watchId !== null) return;
  _watchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (!_isUnlocked) return;
      const { latitude: lat, longitude: lng } = pos.coords;
      const stillIn = CONFIG.zones.some(z => haversine(lat, lng, z.lat, z.lng) <= z.radius);
      if (!stillIn) revoke();
    },
    null,
    { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
  );
}

function revoke() {
  _isUnlocked = false;

  // Kill the player
  const playerWrap = document.getElementById('playerWrap');
  playerWrap.innerHTML = '';
  playerWrap.classList.remove('visible');

  // Hide pre-save button
  document.getElementById('presaveWrap').classList.remove('visible');

  // Re-show locate button
  const ctaWrap = document.getElementById('ctaWrap');
  ctaWrap.classList.remove('hidden');
  const btn = document.getElementById('btnLocate');
  btn.disabled    = false;
  btn.textContent = 'Find my location';

  // Hide artwork background
  document.getElementById('bgArt').classList.remove('visible');

  setStatus("You've left the zone — return to unlock again.");
}
// ─────────────────────────────────────────────────────────────────────────────

function unlock(cityName) {
  // Light up that city's dot (first one matching)
  const dots = dotsEl.querySelectorAll('.dot');
  if (dots.length) dots[Math.floor(Math.random() * dots.length)].classList.add('active');

  // Reveal artwork
  document.getElementById('artwork').classList.add('unlocked');

  // Title turns orange on unlock
  setTimeout(() => {
    document.getElementById('trackTitle').classList.add('unlocked');
  }, 800);

  // Reveal full-screen artwork background
  setTimeout(() => {
    document.getElementById('bgArt').classList.add('visible');
  }, 600);

  // Inject player
  const playerWrap = document.getElementById('playerWrap');
  playerWrap.innerHTML = CONFIG.embedHTML;
  playerWrap.classList.add('visible');

  // Reveal pre-save button after artwork has had its moment
  setTimeout(() => {
    document.getElementById('presaveWrap').classList.add('visible');
  }, 2800);

  // Mark as unlocked and start continuous geo-watch
  _isUnlocked = true;
  startWatching();

  // Hide CTA
  document.getElementById('ctaWrap').classList.add('hidden');

  setStatus('');
}

function checkLocation() {
  const btn = document.getElementById('btnLocate');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported on this device.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('scanning');
  btn.textContent = 'Locating…';
  setStatus('Finding you…', true);

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.classList.remove('scanning');
      const { latitude: lat, longitude: lng } = pos.coords;

      for (const zone of CONFIG.zones) {
        const dist = haversine(lat, lng, zone.lat, zone.lng);
        if (dist <= zone.radius) {
          unlock(zone.city);
          return;
        }
      }

      // Not in any zone
      btn.disabled = false;
      btn.textContent = 'Find my location';
      setStatus('Not there yet. Find the right place.');
    },
    (err) => {
      btn.classList.remove('scanning');
      btn.disabled = false;
      btn.textContent = 'Find my location';

      const msgs = {
        1: 'Location access denied. Enable it in your browser settings.',
        2: 'Position unavailable. Try again outside.',
        3: 'Request timed out. Try again.',
      };
      setStatus(msgs[err.code] || 'Something went wrong. Try again.');
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}
</script>
</body>
</html>
